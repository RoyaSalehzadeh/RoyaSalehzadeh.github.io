<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Projects | Roya Salehzadeh</title>

  <style>
    :root{
      --text:#222;
      --muted:#666;
      --link:#0b61a4;
      --line:#ececec;
      --bg:#ffffff;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      line-height:1.6;
    }

    header{
      border-bottom:1px solid var(--line);
      background:#fff;
      position:sticky;
      top:0;
      z-index:10;
    }
    .topbar{
      max-width:1100px;
      margin:0 auto;
      padding:14px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }
    .brand{
      font-weight:650;
      letter-spacing:.2px;
      text-decoration:none;
      color:var(--text);
      white-space:nowrap;
    }
    nav a{
      color:var(--muted);
      text-decoration:none;
      margin-left:18px;
      font-weight:500;
    }
    nav a:hover{ color:var(--link); }

    a{ color:var(--link); text-decoration:none; }
    a:hover{ text-decoration:underline; }

    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:28px 18px 60px;
      display:grid;
      grid-template-columns: 280px 1fr;
      gap:34px;
      align-items:start;
    }

    .profile{
      position:sticky;
      top:78px;
      border-right:1px solid var(--line);
      padding-right:28px;
    }
    .avatar{
      width:190px;
      height:190px;
      border-radius:50%;
      object-fit:cover;
      display:block;
      margin:8px 0 14px;
      border:6px solid #f4f4f4;
    }
    .name{
      font-size:1.25rem;
      font-weight:700;
      margin:0;
    }
    .title{
      margin:6px 0 14px;
      color:var(--muted);
      font-size:.95rem;
    }
    .meta{
      margin:14px 0 0;
      padding:0;
      list-style:none;
      color:var(--muted);
      font-size:.95rem;
    }
    .meta li{
      display:flex;
      gap:10px;
      align-items:flex-start;
      margin:10px 0;
    }
    .icon{ width:18px; text-align:center; opacity:.85; }

    .links{
      margin-top:14px;
      padding-top:14px;
      border-top:1px solid var(--line);
    }
    .links a{
      display:flex;
      align-items:center;
      gap:10px;
      margin:10px 0;
      color:var(--text);
    }
    .links a span{ color:var(--muted); }
    .links a:hover span{ color:var(--link); }

    .content h2{
      font-size:1.6rem;
      margin:0 0 10px;
    }
    .section{
      padding:0 0 26px;
      border-bottom:1px solid var(--line);
      margin-bottom:26px;
    }

    <section class="content">
      <div class="section" style="border-bottom:none;margin-bottom:0;padding-bottom:0;">
        <h2>Publications</h2>
        <p style="color:var(--muted);margin-top:0;">(Add your papers here. You can also link to Google Scholar.)</p>

        <h3>Journal Articles</h3>
        <ol>
          <li><b>Paper Title</b>. Authors. Venue, Year. <a href="#">PDF</a> • <a href="#">DOI</a></li>
          <li><b>Paper Title</b>. Authors. Venue, Year. <a href="#">PDF</a> • <a href="#">DOI</a></li>
        </ol>

        <h3>Conference Papers</h3>
        <ol>
          <li><b>Paper Title</b>. Authors. Conference, Year. <a href="#">PDF</a></li>
        </ol>
      </div>
    </section>
  </main>
</body>
</html>
